name: 釜山ホテル空室監視

on:
  schedule:
    - cron: '*/15 * * * *'   # 15分おきに実行
  workflow_dispatch:           # GitHub画面から手動実行も可能

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Chrome
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q google-chrome-stable

      - name: Install dependencies
        run: pip install -r hotel_monitor/requirements.txt

      - name: Run hotel monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python hotel_monitor/monitor_hotels.py

      - name: Upload screenshots for debugging
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          retention-days: 3
