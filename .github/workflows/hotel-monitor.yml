name: 釜山ホテル空室監視

on:
  schedule:
    - cron: '*/15 * * * *'   # 15分おきに実行
  workflow_dispatch:           # GitHub画面から手動実行も可能

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: hotel_monitor/requirements.txt

      - name: Install Python dependencies
        run: pip install -r hotel_monitor/requirements.txt

      - name: Install Playwright browser
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run hotel monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python hotel_monitor/monitor_hotels.py
