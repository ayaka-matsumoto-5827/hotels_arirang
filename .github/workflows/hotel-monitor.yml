name: 釜山ホテル空室監視

on:
  schedule:
    - cron: '*/15 * * * *'   # 15分おきに実行
  workflow_dispatch:           # GitHub画面から手動実行も可能

jobs:
  monitor:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: hotel_monitor/requirements.txt

      - name: Install Python dependencies
        run: pip install -r hotel_monitor/requirements.txt

      - name: Install system dependencies for Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 \
            libasound2t64 libpango-1.0-0 libcairo2

      - name: Install Playwright browser
        run: playwright install chromium

      - name: Run hotel monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python hotel_monitor/monitor_hotels.py
